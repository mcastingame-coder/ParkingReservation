<!DOCTYPE html>
<html lang="th">
<head> 
<meta name="theme-color" content="#4e73df">
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parking Reservation</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
import { getDatabase, ref, push, set, get, child } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBeHQs4qOqXDYseMGmLRNlzOJesvgyUcS8",
  authDomain: "parking-reservation-8a90d.firebaseapp.com",
  databaseURL: "https://parking-reservation-8a90d-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "parking-reservation-8a90d",
  storageBucket: "parking-reservation-8a90d.appspot.com",
  messagingSenderId: "229489334106",
  appId: "1:229489334106:web:80f41505d329ace87b4563",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ---------------- TIME ----------------
function thaiTime(ts) {
  return new Date(ts).toLocaleString("th-TH", {
    timeZone: "Asia/Bangkok",
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });
}

// ---------------- LANGUAGE ----------------
const text = {
  th: {
    title: "ระบบจองที่จอดรถ",
    phone: "กรอกเบอร์โทรศัพท์",
    reserve: "จองที่จอดรถ",
    already: "เบอร์นี้เคยจองแล้ว",
    qr: "QR Code สำหรับเข้าใช้บริการ",
    used: "⚠ QR นี้ถูกใช้งานแล้ว",
    error: "กรุณากรอกเบอร์ให้ถูกต้อง"
  },
  en: {
    title: "Parking Reservation System",
    phone: "Enter mobile number",
    reserve: "Reserve Parking",
    already: "This number already has a reservation",
    qr: "Your Parking QR Code",
    used: "⚠ This QR has already been used",
    error: "Please enter a valid phone number"
  }
};

let lang = "th";
window.changeLang = l => {
  lang = l;
  title.innerText = text[l].title;
  phoneInput.placeholder = text[l].phone;
  reserveBtn.innerText = text[l].reserve;
};

// ---------------- RESERVE ----------------
window.reserve = async () => {
  try {
    const phone = phoneInput.value.trim();
    if (phone.length < 8) return alert(text[lang].error);

    const snap = await get(child(ref(db), "user_reservations/" + phone));

    if (snap.exists()) {
      const d = snap.val();
      showQR(d.id, d.time_th, d.used, d.expire_time); 
      alert(text[lang].already);
      return;
    }

    const r = push(ref(db, "reservations"));
    const id = r.key;
    const now = Date.now();
    const expireTime = now + (30 * 60 * 1000);

    const data = {
      id,
      phone,
      timestamp: now,
      expire_time: expireTime,
      time_th: thaiTime(now),
      expire_time_th: thaiTime(expireTime),
      used: false
};

    await set(r, data);
    await set(ref(db, "user_reservations/" + phone), data);

    showQR(id, data.time_th, false, data.expire_time);

  } catch (e) {
    console.error(e);
    alert("System error");
  }
};

// ---------------- SHOW QR ----------------
function showQR(id, time, used, expire_time) {
  qrTitle.style.display = "block";
  showTime.innerText = time;
  const now = Date.now();
  if (expire_time && now > expire_time) {
    usedNote.style.display = "block";
    usedNote.innerText = "⚠ QR หมดเวลาแล้ว";
    return;
}

  const canvas = document.getElementById("qrCanvas");
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  QRCode.toCanvas(canvas, id, { width: 240 });
  usedNote.style.display = used ? "block" : "none";
}
</script>

<style>
body {
  font-family: "Prompt", sans-serif;
  background: linear-gradient(135deg, #000000, #434343);
  margin: 0;
  padding: 20px;
  color: #333;
  text-align: center;
}

.container {
  max-width: 420px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.3);
}

input {
  width: 90%;
  padding: 14px;
  font-size: 18px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 15px;
  font-size: 20px;
  margin-top: 20px;
  background: #4e73df;
  color: white;
  border: none;
  border-radius: 12px;
  cursor: pointer;
}

.lang {
  margin: 10px;
  padding: 6px 14px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
}

#qrCanvas {
  margin-top: 20px;
}

#usedNote {
  color: red;
  font-weight: bold;
  display: none;
}
</style>
</head>

<body>

<h2 id="title">ระบบจองที่จอดรถ</h2>

<button class="lang" onclick="changeLang('th')">ไทย</button>
<button class="lang" onclick="changeLang('en')">English</button>

<div class="container">
  <input id="phoneInput" placeholder="กรอกเบอร์โทรศัพท์">
  <button id="reserveBtn" onclick="reserve()">จองที่จอดรถ</button>

  <h3 id="qrTitle" style="display:none;">QR Code สำหรับเข้าใช้บริการ</h3>
  <div id="showTime"></div>
  <canvas id="qrCanvas" width="240" height="240"></canvas>
  <div id="usedNote">⚠ QR นี้ถูกใช้งานแล้ว</div>
</div>

</body>
</html>
